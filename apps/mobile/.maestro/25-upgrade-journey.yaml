appId: ${APP_ID}
name: Upgrade journey - Free user opens upgrade wall, BE-mocked purchase grants premium
tags:
  - smoke
  - regression
---
# REGRESSION + COVERAGE for the premium upgrade path.
#
# === Why a BE mock instead of a real RevenueCat purchase ===
# RevenueCat's native purchase sheet (StoreKit on iOS) cannot be driven
# from a simulator in CI - there is no reliable way to tap through the
# system payment dialog from Maestro. This is THE explicitly approved
# BE mock for the entire E2E suite (see PR #25, #35).
#
# === How the mock works ===
# When BOTH `EXPO_PUBLIC_MAESTRO_E2E=1` (mobile build env) AND the
# RevenueCat key is a stub (`ci-stub` etc), `payments.purchasePackage`
# routes the tap to a dev-only tRPC mutation `payment.maestroGrantPremium`
# which calls the same `PaymentService.createSubscription` path the real
# RevenueCat INITIAL_PURCHASE webhook hits. The mobile then synthesizes
# a CustomerInfo payload with active premium entitlement and writes it
# into the queryClient, triggering the same UI updates as a real
# `addCustomerInfoUpdateListener` callback.
#
# === Gating (belt + suspenders) ===
#   - Mobile: EXPO_PUBLIC_MAESTRO_E2E === "1" AND stub RC key
#   - BE:     NODE_ENV !== "production" AND MAESTRO_E2E === "1"
# Either gate alone refuses the call. There is no path from a production
# build / non-CI API to reach this mutation.
#
# === Build env required ===
# This flow REQUIRES the mobile app to have been built with
# EXPO_PUBLIC_MAESTRO_E2E=1 baked in via expo-constants. CI sets this
# automatically (see .github/workflows/e2e-mobile.yml). For local sim
# runs, the dev app installed via Expo Dev Build inherits the local
# .env at build time - confirm with:
#   grep -c MAESTRO_E2E:undefined apps/mobile/.../main.jsbundle  # 0=OK
# If undefined, the tap will fall through to the real
# Purchases.purchasePackage path which throws "Simulator Detected".
- launchApp:
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd
- runFlow: utils/login-returning.yaml
- waitForAnimationToEnd:
    timeout: 15000
- takeScreenshot: 25-01-after-login

# --- Step 1: confirm starting state on Profile tab ---
# The pre-script scripts/pre/25-reset-plan.sh sets test@pegada.app's
# User.plan back to FREE before each run so the upgrade CTA is visible
# (the previous run would have left the user PREMIUM otherwise).
- tapOn:
    id: "tab-profile"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: 25-02-on-profile-free

# --- Step 2: open the upgrade wall via deep link ---
# router.push(SceneName.UpgradeWall) - the same destination CurrentPlanConfig
# pushes to when a Free user taps the row.
- openLink: ${APP_SCHEME}://upgrade-wall
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: 25-03-on-upgrade-wall

# --- Step 3: tap the purchase CTA ---
# In Maestro-mock mode (EXPO_PUBLIC_MAESTRO_E2E=1 build): hits the BE
# mock -> mobile synthesizes premium CustomerInfo -> upgrade wall calls
# router.back() onSuccess. Resulting screen is the Profile tab with
# premium UI.
#
# Without the mock env (dev sim build): the SDK falls through to
# Purchases.purchasePackage which detects the simulator and alerts
# "Simulator Detected. Purchases are not available in the IOS
# simulator. Please try on a real device." We dismiss the OK button
# and capture the alert as proof the CTA WAS tappable - the
# environmental gate is what blocks completion, not the UI.
#
# CTA position: sticky bottom action, same as flow 24's Save Profile
- tapOn:
    id: "upgrade-wall-purchase-cta"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: 25-04-after-purchase-tap

# Dismiss the "Simulator Detected" alert if it surfaced (dev-build path).
# In CI / mock-mode this alert does NOT appear so the tap is optional.
- tapOn:
    text: "OK"
    optional: true
- waitForAnimationToEnd

# --- Step 4: re-open Profile to capture the final plan state ---
# successful mock purchase. In dev-build mode: we're still on the upgrade
# wall; tap the close button (top-right, hitSlop set in PR #37) and
# navigate to Profile manually.
- tapOn:
    id: "upgrade-wall-close"
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: "upgrade-wall-close"
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: "tab-profile"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 25-05-on-profile-after-purchase

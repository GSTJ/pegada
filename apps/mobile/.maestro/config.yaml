flows:
excludeTags:
  - util
executionOrder:
  continueOnFailure: false
  flowsOrder:
    - 01-launch
    - 02-sign-in
    - 03-create-profile
    - 04-complete-profile
    - 05-ask-location
    - 06-force-update
    - 07-tabs-navigation
    - 08-swipe-like
    - 09-swipe-dislike
    - 10-dog-profile
    - 11-messages-list
    - 12-chat-conversation
    - 19-chat-message-order
    - 25-upgrade-journey
    - 20-account-creation-journey
    - 21-swipe-journey
    - 22-new-match-journey
    - 23-preferences-journey
    - 24-profile-journey
    - 26-logout-journey
    # 27 MUST run last — it hard-deletes the delete-me@pegada.app row. The
    # row is re-seeded by `pnpm -F @pegada/database maestro:seed` before
    # every test run (see packages/database/maestro-seed.ts), but other
    # flows have no reason to rerun this expensive teardown mid-suite.
    - 27-delete-account-journey

appId: ${APP_ID}
name: Account creation — fresh signup → CreateProfile → CompleteProfile → AskForLocation → Swipe
tags:
  - smoke
  - regression
---
# Full account-creation user journey for a brand-new user.
#
# Replaces the disjoint 03/04/05 smoke flows with one realistic, assert-driven
# walk that mirrors what a real first-time user does:
#
#   1. Cold-launch with cleared state + keychain + pre-granted permissions
#      (photos:all, location:inuse, notifications:allow). Pre-granting from
#      launchApp removes three system dialogs from the critical path — Maestro
#      still has `optional: true` fallbacks below for the cases where iOS
#      decides to re-prompt anyway (real on iOS 26 Release builds).
#
#   2. Sign in via utils/login-fresh.yaml — the API's APPLE_MAGIC_EMAIL_REGEX
#      bypass (^maestro-fresh.*@pegada\.app$ — see
#      packages/api/src/services/AuthenticationService.ts → isFreshMagicEmail)
#      hard-purges the matching user + cascading Dog/Image/Match/Interest/
#      Message rows BEFORE upserting, so the auth router always lands on
#      CreateProfile regardless of any prior run's state. Two back-to-back
#      runs are safe — the delete-then-upsert keeps state clean.
#
#   3. CreateProfile (apps/mobile/src/views/(auth)/CreateProfile/index.tsx):
#      single screen with photos grid (ProfileImagesUploader → AddUserPhoto),
#      dog-name TextInput, optional bio, and gender RadioButtons (defaults
#      to MALE). Submit requires ≥1 image + name. Order in this flow:
#      upload photo → type name → submit (skip bio, keep default gender).
#
#   4. CompleteProfile (apps/mobile/src/views/(auth)/CompleteProfile/index.tsx):
#      requires a birthdate. We type it directly into the masked text input
#      — the date-picker modal is iOS-system UI and adds picker-wheel
#      flakiness we don't need for E2E coverage.
#
#   5. AskForLocation: tap Enable Location → defensively dismiss any system
#      prompt that still appears even with location:inuse pre-granted.
#
#   6. Swipe tab: assertVisible on `swipe-screen` testID (added to the Swipe
#      view's outer Container) — proves we reached the tabs even for a fresh
#      account whose deck is empty.
#
# iOS 26 Fabric constraints (carried over from utils/login-fresh.yaml):
# - The XCUITest accessibility snapshot is BLIND to most RN-rendered text
#   for this app build. Stable testIDs (added across this PR series) are
#   the only reliable in-app anchors; native system UI uses native
#   accessibility labels (text: "Choose from Library", "Allow While Using
#   App", etc.) which XCUITest CAN see.
# - Coordinate-based taps are used ONLY where a testID is genuinely
#   unreachable — specifically the iOS native photo-picker grid (no
#   testIDs in Apple-provided UI) and within login-fresh.yaml.
#
# Photo upload regression fix (PR #36): on iOS 26 Release builds the
# presigned PUT used to time out before completing — the 15s wait below
# is the empirical ceiling on slow CI runners (local sim completes in ~2s).

- launchApp:
    clearState: true
    clearKeychain: true
    permissions:
      photos: all
      location: inuse
      notifications: allow
- waitForAnimationToEnd

# ---------------------------------------------------------------------------
# 1. Sign in as a fresh user — lands on CreateProfile
# ---------------------------------------------------------------------------
# utils/login-fresh.yaml drops the user on CreateProfile every time via the
# regex-magic bypass. It also dismisses the ATT prompt internally.
- takeScreenshot: 20-01-on-email
- runFlow: utils/login-fresh.yaml
- waitForAnimationToEnd:
    timeout: 15000
- takeScreenshot: 20-02-on-create-profile

# ---------------------------------------------------------------------------
# 2. CreateProfile — type dog name + upload one photo + submit
# ---------------------------------------------------------------------------
# Tap the dog-name TextInput by testID first so the keyboard opens BEFORE
# we trigger the photo picker (which dismisses the keyboard). This keeps
# the screen layout stable for the photo-cell tap below.
- tapOn:
    id: "profile-name"
- waitForAnimationToEnd
- inputText: "MaestroPup"
- takeScreenshot: 20-03-after-name

# Dismiss the keyboard by tapping outside any TextInput. The Container is
# a ScrollView with keyboardShouldPersistTaps="handled" — tapping the
# section header text region above the input is safe and predictable.
- hideKeyboard
- waitForAnimationToEnd

# Tap the first photo slot. testID `add-photo-0` is on the PressableArea
# inside ProfileImageUploader → AddUserPhoto. AddUserPhoto exposes both
# `add-photo-<index>` (the empty slot) and `add-photo-button-<index>`
# (the "+" overlay button) — the slot itself is the more forgiving target.
- tapOn:
    id: "add-photo-0"
- waitForAnimationToEnd:
    timeout: 5000

# Image picker shows a native Alert with: Take Photo / Choose from Library
# / Cancel. Choose from Library is the deterministic path on the iOS
# simulator which always seeds 4 stock photos in the Photos app.
- tapOn:
    text: "Choose from Library"
- waitForAnimationToEnd:
    timeout: 8000

# Photo library may show a "Select Photos" permission sheet on iOS 14+
# even when `photos: all` was pre-granted, depending on the runtime —
# dismiss defensively. Common state is "all access granted, no sheet".
- tapOn:
    text: "Allow Access to All Photos"
    optional: true
- tapOn:
    text: "Select Photos..."
    optional: true
- waitForAnimationToEnd

# Tap the first photo in the 4-up grid. The iOS simulator photo library
# is native Apple UI — no testIDs available. Coordinates target the
# top-left cell (~20% X / ~30% Y on iPhone 17 Pro Max, 440x956 logical).
- tapOn:
    point: "20%, 30%"
- waitForAnimationToEnd:
    timeout: 5000

# Edit screen: "Choose" (bottom-right) on iOS 16+; older sims show "Use".
# Both are optional because some builds skip the edit step entirely.
- tapOn:
    text: "Choose"
    optional: true
- tapOn:
    text: "Use"
    optional: true
- waitForAnimationToEnd:
    timeout: 15000

# Wait for the S3 upload to complete — ProfileImagesUploader shows an
# ActivityIndicator overlay until the presigned PUT returns. 15s covers
# the iOS 26 Release-build regression fixed in PR #36; local sim
# completes in ~2s.
- takeScreenshot: 20-05-photo-uploaded

# Submit CreateProfile. testID `profile-submit` is shared by Create and
# Complete profile Buttons but only one is mounted at a time so this is
# unambiguous.
- tapOn:
    id: "profile-submit"
- waitForAnimationToEnd:
    timeout: 15000

# ---------------------------------------------------------------------------
# 3. CompleteProfile — pick birthdate + submit
# ---------------------------------------------------------------------------
# `complete-profile-birth-date` is on the masked date Input. Typing
# `01/01/2020` exercises the same path a real user takes when they
# decline the native picker and key the date manually.
- tapOn:
    id: "complete-profile-birth-date"
- waitForAnimationToEnd
- inputText: "01/01/2020"
- takeScreenshot: 20-04-after-birthdate

- tapOn:
    id: "profile-submit"
- waitForAnimationToEnd:
    timeout: 12000

# ---------------------------------------------------------------------------
# 4. AskForLocation — tap Enable Location and accept the system prompt
# ---------------------------------------------------------------------------
- takeScreenshot: 20-06-on-location
- tapOn:
    id: "location-allow"
- waitForAnimationToEnd:
    timeout: 5000

# Defensive: if iOS still pops the location prompt (sim quirk with
# pre-granted permissions on iOS 26), accept it. Both labels are
# present in different iOS versions; either path is fine for the test.
- tapOn:
    text: "Allow While Using App"
    optional: true
- tapOn:
    text: "Allow Once"
    optional: true
- waitForAnimationToEnd:
    timeout: 15000

# ---------------------------------------------------------------------------
# 5. Final assertion — we landed on the Swipe tab
# ---------------------------------------------------------------------------
# `swipe-screen` testID is on the outer SafeAreaView Container in
# apps/mobile/src/views/(tabs)/Swipe/index.tsx — survives even when the
# user has zero cards (fresh account → empty stack with empty-state UI).
- assertVisible:
    id: "swipe-screen"
- takeScreenshot: 20-07-on-swipe

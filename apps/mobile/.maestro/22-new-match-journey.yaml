appId: ${APP_ID}
name: New match — real end-to-end journey (swipe → modal → chat → list)
tags:
  - smoke
  - regression
---
# Real new-match journey, no stubs. Replaces the manual-only 18-new-match.yaml.
#
# Prerequisite (handled by packages/database/maestro-seed.ts):
#   - magic user test@pegada.app owns Rex (MALE, San Francisco)
#   - a "MatchMe" FEMALE dog co-located in SF owns a single-sided
#     Interest(requesterId=matchMe, responderId=rex, swipeType=INTERESTED)
#   - SuggestionService.getPotentialMatches ORDERs BY distance ASC, so MatchMe
#     (~0km) appears at the top of Rex's swipe stack ahead of the 100 random
#     Brazil-based seed dogs (~9000km)
#
# When Rex taps LIKE on MatchMe:
#   - swipeRouter.swipe sees the pre-existing reciprocal interest
#   - MatchService.createMatch is called for real
#   - the API responds with { match }
#   - the redux saga pushes /new-match → modal opens
#
# From the modal we tap "Send a message", land on the chat, send a unique
# message, navigate back, and assert the new match shows in the messages list
# with the unique message as its preview.
- launchApp:
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd
- runFlow: utils/login-returning.yaml
- waitForAnimationToEnd:
    timeout: 15000
- takeScreenshot: 22-after-login
# Rex lands on the swipe tab. MatchMe is the top card (seeded at distance ~0).
- assertVisible:
    text: "MatchMe"
    timeout: 10000
- takeScreenshot: 22-matchme-card-visible
# Like button lives in the MatchActionBar (testID 'swipe-like').
- tapOn:
    id: "swipe-like"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: 22-new-match-modal
# NewMatch modal is pushed by the swipe saga only when the API returns
# `{ match }` — proves the match was created end-to-end via the DB.
- assertVisible:
    id: "new-match-screen"
    timeout: 15000
- assertVisible:
    id: "new-match-send"
- assertVisible:
    text: "MatchMe"
- tapOn:
    id: "new-match-send"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: 22-on-chat
# Chat header shows MatchMe's name (DogProfileInfo in Chat/Header).
- assertVisible:
    id: "chat-screen"
    timeout: 10000
- assertVisible:
    text: "MatchMe"
# Send a unique message — it must round-trip through the API and render.
- tapOn:
    id: "chat-input"
- waitForAnimationToEnd:
    timeout: 1000
- inputText: "MATCH22_FIRST_MESSAGE"
- takeScreenshot: 22-chat-typed
# Send button (icon to the right of the input) — ~92%, 70% Y when keyboard up.
- tapOn:
    point: "92%, 70%"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: 22-chat-after-send
- assertVisible: "MATCH22_FIRST_MESSAGE"
# Back to the messages list — the new match must appear with the new message
# as its preview (last-message subtitle on the chat row).
- runFlow: utils/back.yaml
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 22-on-messages-list
- assertVisible:
    text: "MatchMe"
- assertVisible:
    text: "MATCH22_FIRST_MESSAGE"

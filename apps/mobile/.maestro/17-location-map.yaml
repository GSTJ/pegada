appId: ${APP_ID}
name: Location map renders
tags:
  - smoke
---
# Sign in returning, open location-map via deep link, capture screenshot.
- launchApp:
    clearState: true
    clearKeychain: true
    permissions:
      location: inuse
- waitForAnimationToEnd
- runFlow: utils/login-returning.yaml
- takeScreenshot: 17-after-login
- openLink: ${APP_SCHEME}://location-map
- waitForAnimationToEnd
- extendedWaitUntil:
    notVisible: "__wait__"
    timeout: 8000
    optional: true
- takeScreenshot: 17-on-map

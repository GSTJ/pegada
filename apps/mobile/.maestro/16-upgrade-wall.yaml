appId: ${APP_ID}
name: Upgrade wall — open via deep link, dismiss
tags:
  - smoke
---
# Sign in returning, open upgrade wall via deep link, capture screenshot,
# close via top-left X.
- launchApp:
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd
- runFlow: utils/login-returning.yaml
- takeScreenshot: 16-after-login
- openLink: ${APP_SCHEME}://upgrade-wall
- waitForAnimationToEnd
- extendedWaitUntil:
    notVisible: "__wait__"
    timeout: 8000
    optional: true
- takeScreenshot: 16-on-upgrade
# Close (X button top-left/right) — try top-right corner first
- tapOn:
    point: "92%, 7%"
- waitForAnimationToEnd
- takeScreenshot: 16-after-close

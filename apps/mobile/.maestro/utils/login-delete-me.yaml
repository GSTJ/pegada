appId: ${APP_ID}
name: util - login as the disposable delete-me account
tags:
  - util
---
# Logs in as delete-me@pegada.app — a magic email reserved for the
# delete-account journey (apps/mobile/.maestro/27-delete-account-journey.yaml).
# This account is hard-deleted by the test itself, so it must be re-seeded
# before every run via `pnpm -F @pegada/database maestro:seed` (see
# packages/database/maestro-seed.ts).
#
# Requires the API to recognize delete-me@pegada.app as a magic email.
# APPLE_MAGIC_EMAIL is now a comma-separated list — set it to
# "test@pegada.app,delete-me@pegada.app" in your environment. See
# packages/api/src/shared/config.ts → isMagicEmail.
#
# utils/login-returning.yaml.
- runFlow: dismiss-system-dialogs.yaml
# Email screen: tap the email field, type, then tap Continue (above keyboard).
#
- tapOn:
    id: "signin-email"
- waitForAnimationToEnd
# the field is empty before we input the real email — otherwise a stray
# `v` would yield `vdelete-me@pegada.app` which is NOT in
# APPLE_MAGIC_EMAIL and the downstream 424242 submit is rejected.
- eraseText: 50
- waitForAnimationToEnd
- inputText: "delete-me@pegada.app"
- tapOn:
    id: "signin-submit"
- waitForAnimationToEnd:
    timeout: 8000
# ATT dialog fires asynchronously after email submit — dismiss before OTP.
- runFlow: dismiss-system-dialogs.yaml
- waitForAnimationToEnd
# Regression guard for issue #40: if the email tap lands in the keyboard
# the email, the magic-email check rejects it, and the flow gets stuck on
# the email screen with a QWERTY keyboard. The OTP screen swaps in iOS's
# CAN see even though app-rendered RN text cannot. Assert it here so a
# into "OTP cells never filled" timeouts in every dependent flow.
- assertVisible: "Next"
# OTP: first cell does not auto-focus on iOS 26 — tap center of OTP row
# then enter digits. Same pattern as utils/login-returning.yaml.
- tapOn:
    point: "50%, 43%"
- waitForAnimationToEnd
- inputText: "4"
- waitForAnimationToEnd:
    timeout: 25
- inputText: "2"
- waitForAnimationToEnd:
    timeout: 25
- inputText: "4"
- waitForAnimationToEnd:
    timeout: 25
- inputText: "2"
- waitForAnimationToEnd:
    timeout: 25
- inputText: "4"
- waitForAnimationToEnd:
    timeout: 25
- inputText: "2"
- waitForAnimationToEnd:
    timeout: 25000
# ATT dialog may surface again after OTP submission.
- runFlow: dismiss-system-dialogs.yaml
- tapOn:
    text: "Allow"
    optional: true
- waitForAnimationToEnd

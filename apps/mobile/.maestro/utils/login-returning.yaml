appId: ${APP_ID}
name: util - login as returning user (lands on swipe tabs)
tags:
  - util
---
# Logs in as test@pegada.app — the magic email. The user must be seeded
# with a Dog + Match + chats so the auth router pushes straight to swipe
# (see packages/database/local-seed.ts / /tmp/pegada-magic-seed.ts).
#
# IMPORTANT: do NOT use test+returning|bella|max here. Those emails are
# NOT in APPLE_MAGIC_EMAIL, so sendVerification ROTATES their DB code on
# every email submit, and 424242 will be rejected as "Invalid code".
# Only test@pegada.app (the actual APPLE_MAGIC_EMAIL) is exempt from the
# overwrite and reliably accepts 424242 every time.
#
- runFlow: dismiss-system-dialogs.yaml
# Email screen: tap email field, type, then tap Continue (above keyboard).
# visible in MAESTRO_E2E builds (magic-modal FullWindowOverlay disabled +
- tapOn:
    id: "signin-email"
- waitForAnimationToEnd
# `vtest@pegada.app` which is NOT a magic email — code rotates and the
# downstream 424242 OTP submit is rejected). Erase 50 chars (well above
# any sane manual prefix) so the field is empty before we input the real
# email.
- eraseText: 50
- waitForAnimationToEnd
- inputText: "test@pegada.app"
- tapOn:
    id: "signin-submit"
- waitForAnimationToEnd:
    timeout: 8000
# ATT dialog fires asynchronously during OTP screen load — dismiss it
# before attempting to interact with the OTP cells.
- runFlow: dismiss-system-dialogs.yaml
- waitForAnimationToEnd
# Regression guard for issue #40: if the email tap lands in the keyboard
# the email, the magic-email check rejects it, and the flow gets stuck on
# the email screen with a QWERTY keyboard. The OTP screen swaps in iOS's
# CAN see even though app-rendered RN text cannot. Assert it here so a
# into "OTP cells never filled" timeouts in every dependent flow.
- assertVisible: "Next"
# then enter all 6 digits as a single string.
- tapOn:
    id: "otp-digit-0"
- waitForAnimationToEnd
- inputText: "4"
- waitForAnimationToEnd:
    timeout: 25
- inputText: "2"
- waitForAnimationToEnd:
    timeout: 25
- inputText: "4"
- waitForAnimationToEnd:
    timeout: 25
- inputText: "2"
- waitForAnimationToEnd:
    timeout: 25
- inputText: "4"
- waitForAnimationToEnd:
    timeout: 25
- inputText: "2"
- waitForAnimationToEnd:
    timeout: 25000
# ATT dialog may appear during/after OTP submission.
- runFlow: dismiss-system-dialogs.yaml
- tapOn:
    text: "Allow"
    optional: true
- waitForAnimationToEnd

appId: ${APP_ID}
name: util - login as returning user (lands on swipe tabs)
tags:
  - util
---
# Logs in as test+returning@pegada.app which has dog Rex + match Bella + chats,
# so the auth router pushes straight to the swipe tab. Caller must already
# have launchApp'd. Coordinates calibrated on iPhone 17 Pro Max.
- tapOn:
    text: "Ask App Not to Track"
    optional: true
- tapOn:
    text: "Allow Once"
    optional: true
- tapOn:
    text: "Don.t Allow"
    optional: true
- tapOn:
    point: "50%, 55%"
- waitForAnimationToEnd
- inputText: "test+returning@pegada.app"
- hideKeyboard
- tapOn:
    point: "50%, 62%"
- extendedWaitUntil:
    notVisible: "__wait_for_otp_screen__"
    timeout: 10000
    optional: true
# OTP — type one digit at a time, tapping each cell first to give it focus.
- tapOn:
    point: "12%, 40%"
- waitForAnimationToEnd
- inputText: "4"
- tapOn:
    point: "25%, 40%"
- inputText: "2"
- tapOn:
    point: "38%, 40%"
- inputText: "4"
- tapOn:
    point: "51%, 40%"
- inputText: "2"
- tapOn:
    point: "64%, 40%"
- inputText: "4"
- tapOn:
    point: "77%, 40%"
- inputText: "2"
- hideKeyboard
- extendedWaitUntil:
    notVisible: "__wait_for_tabs__"
    timeout: 25000
    optional: true

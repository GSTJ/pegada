appId: ${APP_ID}
name: util - login as returning user (lands on swipe tabs)
tags:
  - util
---
# Logs in as test@pegada.app — the magic email. The user must be seeded
# with a Dog + Match + chats so the auth router pushes straight to swipe
# (see packages/database/local-seed.ts / /tmp/pegada-magic-seed.ts).
#
# IMPORTANT: do NOT use test+returning|bella|max here. Those emails are
# NOT in APPLE_MAGIC_EMAIL, so sendVerification ROTATES their DB code on
# every email submit, and 424242 will be rejected as "Invalid code".
# Only test@pegada.app (the actual APPLE_MAGIC_EMAIL) is exempt from the
# overwrite and reliably accepts 424242 every time.
#
# Caller must already have launchApp'd. Coordinates calibrated on
# iPhone 17 Pro Max (440x956 logical, 1320x2868 px).
- tapOn:
    text: "Ask App Not to Track"
    optional: true
- tapOn:
    text: "Allow Once"
    optional: true
- tapOn:
    text: "Don.t Allow"
    optional: true
# Email screen: tap email field, type, then tap Continue (above keyboard).
# pressKey:Enter is NOT used — on iOS 26 it does not dismiss the keyboard
# or advance to OTP. The Continue button sits at ~59% Y when keyboard is
# open (keyboard occupies the bottom ~40% of the viewport).
- tapOn:
    point: "50%, 84%"
- waitForAnimationToEnd
- inputText: "test@pegada.app"
- tapOn:
    point: "50%, 59%"
- waitForAnimationToEnd:
    timeout: 8000
# ATT dialog fires asynchronously during OTP screen load — dismiss it
# before attempting to interact with the OTP cells.
- tapOn:
    text: "Ask App Not to Track"
    optional: true
- tapOn:
    text: "Don.t Allow"
    optional: true
- waitForAnimationToEnd
# OTP: on iOS 26 + RN Fabric the first OTP cell does NOT receive focus
# automatically after screen transition. Tap center of OTP row (~50%,43%)
# then enter all 6 digits as a single string.
- tapOn:
    point: "50%, 43%"
- waitForAnimationToEnd
- inputText: "4"
- waitForAnimationToEnd:
    timeout: 25
- inputText: "2"
- waitForAnimationToEnd:
    timeout: 25
- inputText: "4"
- waitForAnimationToEnd:
    timeout: 25
- inputText: "2"
- waitForAnimationToEnd:
    timeout: 25
- inputText: "4"
- waitForAnimationToEnd:
    timeout: 25
- inputText: "2"
- waitForAnimationToEnd:
    timeout: 25000
# ATT dialog may appear during/after OTP submission.
- tapOn:
    text: "Ask App Not to Track"
    optional: true
- tapOn:
    text: "Allow"
    optional: true
- waitForAnimationToEnd

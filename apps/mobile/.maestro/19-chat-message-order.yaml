appId: ${APP_ID}
name: Chat — new sent message appears at the bottom (regression for FlashList v2 inverted drop)
tags:
  - smoke
  - regression
---
# Regression: a user-caught bug where new messages appeared at the TOP of the
# conversation instead of the BOTTOM. Root cause: FlashList v2 dropped the
# `inverted` prop; the API returns messages newest-first (DESC), so without
# reversing in the UI, newest renders at top. Fixed by reversing in
# useChatPagination so newest is at the bottom adjacent to the Send composer.
#
# `assertVisible` text assertions can never match on this build. Rewritten
# in checks/19-chat-order.sh (the sent message actually persisted).
- launchApp:
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd
- runFlow: utils/login-returning.yaml
- waitForAnimationToEnd:
    timeout: 15000
- takeScreenshot: 19-after-login
# Messages tab is the middle icon of the tab bar
- tapOn:
    id: "tab-messages"
- waitForAnimationToEnd
- takeScreenshot: 19-on-messages
# First (seeded Bella) conversation row under the "Messages" header.
# 25% lands in the Matched Dogs thumbnail strip above it and is flaky —
- tapOn:
    id: "messages-chat-row"
- waitForAnimationToEnd:
    timeout: 3000
# First tap after the Messages screen mounts is often eaten — if we did
# navigate, the row no longer exists and this is a no-op.
- tapOn:
    id: "messages-chat-row"
    optional: true
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 8000
- takeScreenshot: 19-on-chat
# Composer TextInput pinned to the bottom of the chat (keyboard closed).
# the Chat KeyboardAvoidingView + iOS 26 keyboard-strip interaction
# shifting paint relative to layout. Tracked as a follow-up; do not
- tapOn:
    id: "chat-input"
- waitForAnimationToEnd:
    timeout: 3000
- inputText: "REGRESSION_BOTTOM_CHECK"
- takeScreenshot: 19-typed
# Submit via the keyboard return key (returnKeyType="send") — the chat
# has no separate send button, so Enter drives Input.onSubmitEditing.
# number pad's "Send" accessory, so tapOn id is not an option here.)
- pressKey: Enter
- waitForAnimationToEnd:
    timeout: 5000
# Screenshot proves the conversation rendered post-send; the DB post-check
# proves the message row persisted. Visual bottom-position ordering is
- takeScreenshot: 19-after-send

appId: app.pegada
---
# Create-profile flow: runs sign-in, fills in dog name, submits, asserts location screen.
# Assumes the magic user has no dog profile yet (fresh DB) so lands on CreateProfile.
- runFlow: sign-in.yaml
- assertVisible:
    id: profile-name
- tapOn:
    id: profile-name
- clearText
- inputText: Buddy
- tapOn:
    id: profile-submit
# After submit we should land on CompleteProfile or AskForLocation.
# Assert the location button appears (it follows CompleteProfile → AskForLocation).
- assertVisible:
    id: location-allow
    timeout: 15000

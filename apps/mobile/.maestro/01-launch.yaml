appId: ${APP_ID}
name: Cold launch shows SignIn
tags:
  - smoke
---
# Cold launch smoke test: app starts and the SignIn screen renders.
# presence + screenshot.
- launchApp:
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd
# ATT prompt can appear on first launch with cleared state — dismiss so it
# doesn't block the email field's autoFocus keyboard.
- runFlow: utils/dismiss-system-dialogs.yaml
# TextInput autofocuses, which raises the SYSTEM keyboard, and keyboard
# keys are native elements with locale-independent identifiers. Keyboard
# visible == JS bundle evaluated + SignIn mounted. Without this, an app
# that crashes right after launchApp (e.g. the missing-keychain-entitlement
# SIGABRT from unsigned builds) sails through a screenshot-only flow and
# the "hard gate" gates nothing.
- extendedWaitUntil:
    visible:
      id: "shift"
    timeout: 20000
- takeScreenshot: 01-launch-signin

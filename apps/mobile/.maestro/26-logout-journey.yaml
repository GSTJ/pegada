appId: ${APP_ID}
name: Logout — Settings → confirm native alert → sign-in screen, session cleared from Keychain
tags:
  - smoke
  - regression
---
# Full logout journey:
#   1. Login as the returning magic user (test@pegada.app).
#   2. Open Profile tab.
#   3. Scroll to reveal the Logout row (below ToS / Privacy / Rate).
#   5. Confirm via the native iOS UIAlertController.
#   6. Screenshot proves we're back on the email/sign-in screen (no native
#      assertion is reliable here — RN tree is empty and the only system
#      element present is the QWERTY keyboard, which is also present on
#      every text input screen so it's not a unique sign-in marker).
#   7. Cold-relaunch with clearState=false / clearKeychain=false. Screenshot
#      proves we are STILL on sign-in — would not be the case if logout
#      left the JWT in Keychain.
#
# and the system keyboard — no testIDs, no rendered text. Every previous
# attempt at `tapOn: { id: profile-logout }` or
# `assertVisible: { id: signin-submit }` FAILS with "no visible element"
# even though the row / button is clearly on-screen in a screenshot.
#
# What DOES work:
#   - native UI assertions (`tapOn: { text: "Logout" }` on UIAlertController
#     buttons, system "Next" accessory above number pad, ATT prompt)
#   - screenshots for visual proof
#   - DB post-checks (this flow has none — logout writes nothing the DB
#     can observe; the Keychain cleanup is verified via the cold-relaunch
#     screenshot)
#
- launchApp:
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd
- runFlow: utils/login-returning.yaml
- waitForAnimationToEnd:
    timeout: 15000
- takeScreenshot: 26-01-after-login

# --- Open Profile tab (rightmost bottom-tab icon) ---
- tapOn:
    id: "tab-profile"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: 26-02-on-profile

# --- Scroll the Settings list to reveal Logout / Delete account ---
# The Profile screen has a fixed sticky "Settings" header and the rows
# below scroll. A single tight upward swipe within the list area
# bounce so this is deterministic.
- swipe:
    start: "50%, 80%"
    end: "50%, 30%"
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: 26-03-settings-scrolled

# --- Tap Logout row by point ---
# (Logout sits below the divider that separates the legal links from the
- tapOn:
    id: "profile-logout"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: 26-04-logout-alert

# --- Confirm via native UIAlertController ---
# i18n keys profile.logout = "Logout" (one word — confirmed canonical
# per PR #39), profile.logoutConfirmation = "Are you sure you want to
# logout?". The alert has TWO elements with the text "Logout" — the
# title and the destructive button — so we anchor the assertion on the
# unique confirmation copy and tap with index:1 to hit the BUTTON
# (index 0 is the title text element).
- assertVisible: "Logout"
- assertVisible: "Are you sure you want to logout?"
- tapOn:
    text: "Logout"
    index: 1
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: 26-05-after-logout

# --- Proof we're back on sign-in: screenshot only ---
# The sign-in screen renders RN content (email input + Continue button)
# but the QWERTY keyboard is present on every text-input screen so its
# visibility is not a unique marker. Screenshot is the honest assertion.
# Downstream evidence: the cold-relaunch below would NOT land here if the
# Keychain token was retained.

# --- Cold relaunch to prove Keychain was wiped ---
- launchApp:
    clearState: false
    clearKeychain: false
- waitForAnimationToEnd:
    timeout: 15000
- takeScreenshot: 26-06-after-cold-relaunch
# If logout had only cleared redux and left the Keychain JWT behind, this
# launch would auto-restore the session and push to (tabs)/Swipe — we
# would see the MatchMe card here instead of the email form. The two
# screenshots (26-05 and 26-06) must visually match the sign-in state.

appId: ${APP_ID}
name: Delete Account - Profile -> confirm native alert -> hard-deleted row + sign-in
tags:
  - smoke
  - regression
  - destructive
---
# App Store Guideline 5.1.1(v): apps that allow account creation MUST
# allow in-app account deletion. This flow proves the end-to-end path:
#
#   1. Pre-script seeds delete-me@pegada.app fresh (the previous run
#      hard-deleted it). See scripts/pre/27-reseed-delete-me.sh.
#   2. Login as delete-me@pegada.app (magic email; APPLE_MAGIC_EMAIL is
#      a comma-list that includes both test@ and delete-me@).
#   3. Profile tab -> scroll -> tap Delete Account row.
#   4. Confirm native iOS UIAlertController ("Delete account" title,
#      destructive "Delete" button per i18n profile.deleteAccount /
#      profile.delete).
#   5. App routes back to sign-in (mutation.then(logout)).
#   6. Cold-relaunch proves the JWT was wiped from Keychain too.
#   7. Post-check checks/27-delete-account.sh verifies the User row is
#      gone from Postgres (hard delete, not soft) - required for
#      Apple's guideline compliance.
#
# We log in as delete-me@pegada.app on purpose. Deleting test@pegada.app
# would break every other Maestro flow on the next run.
#
# === iOS 26 + RN Fabric calibrations ===
# RN view tree is invisible to XCUITest on this build (see flow 26's
# yaml for the full diagnosis). Every in-app row tap goes through
# POINT coords; only native iOS Alert text / SignIn text inputs (which
# back onto UIKit primitives) remain selectable by text.
#
# Coords measured on iPhone 17 Pro Max iOS 26.4 (440x956 / 1320x2868).
# Coordinates DIFFER from test@pegada.app's profile (flow 24/26) because
# delete-me@pegada.app does not have the same dynamic content above
# (no Bella match, no large dog header chrome). Verified empirically
# at run 2026-05-21_203752: Y=68% on delete-me's scrolled Profile
# triggered the LOGOUT dialog, not Delete account.
#
#   - Profile tab              : 83%, 95%
#   - Settings scroll gesture  : swipe 50%,80% -> 50%,30% duration 500ms
#   - Logout row (scrolled)    : 50%, 68% (was 62% on test@pegada.app)
#   - Delete account (scrolled): 50%, 75% (just below Logout)
- launchApp:
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd
- runFlow: utils/login-delete-me.yaml
- waitForAnimationToEnd:
    timeout: 15000
- takeScreenshot: 27-01-after-login

# --- Profile tab ---
- tapOn:
    point: "83%, 95%"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: 27-02-on-profile

# --- Scroll Settings list to reveal Logout + Delete Account rows ---
# Same scroll gesture as flow 26. The Profile ScrollView has bounces=false
# so a single swipe deterministically lands the list at the bottom.
- swipe:
    start: "50%, 80%"
    end: "50%, 30%"
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: 27-03-scrolled

# --- Tap Delete Account row by point ---
# Y=75% after one scroll on delete-me's Profile (Logout sits at Y=68%
# so we MUST keep clear of it - mis-tapping Logout would dismiss the
# delete confirmation entirely and waste the run).
- tapOn:
    point: "50%, 75%"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: 27-04-delete-confirm-dialog

# --- Confirm via native UIAlertController ---
# i18n: profile.deleteAccount = "Delete account" (title), profile.delete
# = "Delete" (destructive button), profile.cancel = "Cancel". The alert
# title and destructive-button text differ ("Delete account" vs
# "Delete") so a single text match on "Delete" reliably hits the button.
# Anchor the assertion on the unique confirmation-question copy to
# guard against the alert never surfacing.
- assertVisible: "Delete account"
- assertVisible: "Are you sure you want to delete your account.*"
- tapOn:
    text: "Delete"
- waitForAnimationToEnd:
    timeout: 15000
- takeScreenshot: 27-05-after-delete

# --- Proof we're back on sign-in: screenshot only ---
# Same as flow 26: the sign-in screen renders RN content invisible to
# XCUITest. No native assertion is reliable here (the QWERTY keyboard
# is present on every text-input screen so it's not a unique marker).
# Screenshot is the honest assertion; the cold-relaunch below proves
# the session was truly wiped from Keychain.

# --- Cold relaunch to prove Keychain was wiped ---
- launchApp:
    clearState: false
    clearKeychain: false
- waitForAnimationToEnd:
    timeout: 15000
- takeScreenshot: 27-06-after-cold-relaunch
# If the logout side of the delete mutation had failed to wipe the
# Keychain JWT, this launch would auto-restore the (now-deleted)
# session and try to push to tabs - but the JWT now points at a
# user row that no longer exists, so the API would 401 and the auth
# router would still send us to sign-in. Both pre-cold (27-05) and
# post-cold (27-06) must visually match the sign-in screen state.

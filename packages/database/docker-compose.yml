version: "3.1"

name: "pegada-dev-environment"

services:
  postgres:
    container_name: pegada-postgres
    image: postgis/postgis
    shm_size: 128mb
    restart: always
    environment:
      POSTGRES_USER: tony
      POSTGRES_PASSWORD: hawk
      POSTGRES_DB: pegada
    ports:
      - "3356:5432"

  redis:
    container_name: pegada-redis
    image: redis:alpine
    command: redis-server
    restart: always
    ports:
      - "6379:6379"

  redis-serverless:
    container_name: pegada-redis-serverless
    image: hiett/serverless-redis-http:latest
    restart: always
    ports:
      - "8079:80"
    environment:
      SRH_MODE: env
      SRH_TOKEN: example_token
      SRH_CONNECTION_STRING: "redis://redis:6379"

  # Dev/e2e-only S3 stand-in so image uploads work without AWS credentials.
  # The API points at it via AWS_S3_ENDPOINT (see packages/api config).
  # Port 9002 to avoid clashing with other local MinIO/S3 tooling on 9000.
  minio:
    container_name: pegada-minio
    image: minio/minio:latest
    command: server /data
    restart: always
    environment:
      MINIO_ROOT_USER: pegada-dev
      MINIO_ROOT_PASSWORD: pegada-dev-secret
    ports:
      - "9002:9000"

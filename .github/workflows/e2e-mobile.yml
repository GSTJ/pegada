name: E2E Mobile (Maestro)

# ---------------------------------------------------------------------------
# REQUIRED GITHUB SECRETS
# ---------------------------------------------------------------------------
# Set these in Settings → Secrets and variables → Actions:
#
#   APPLE_MAGIC_EMAIL  – email accepted by the API bypass (default: test@pegada.app)
#   APPLE_MAGIC_CODE   – 6-digit OTP accepted by the API bypass (default: 424242)
#
# EXPO_PUBLIC_API_URL must also be configured (see "API backend" note below).
#
# ---------------------------------------------------------------------------
# API BACKEND NOTE (KNOWN PARTIAL BLOCKER)
# ---------------------------------------------------------------------------
# The sign-in, create-profile, and swipe Maestro flows all call the tRPC API
# (via EXPO_PUBLIC_API_URL). The API server (apps/nextjs) requires:
#   - PostgreSQL with PostGIS extension
#   - Redis (BullMQ queues)
#   - Serverless-Redis-HTTP (Upstash-compatible, used by the rate-limiter)
#
# GitHub-hosted macOS runners do not support Docker services, so spinning up
# these containers in CI is not straightforward. Options:
#   1. Use a persistent staging API — set EXPO_PUBLIC_API_URL to its URL.
#      The APPLE_MAGIC_EMAIL/CODE bypass means no real email is ever sent.
#   2. Swap to a Linux runner for the API step and use Docker services there,
#      then build/run Maestro on macOS. Requires a matrix approach.
#   3. Replace the tRPC calls with an MSW service-worker mock baked into
#      a dedicated "e2e" build variant.
#
# For now this workflow ONLY runs launch.yaml (cold-launch assertion, no API
# needed) by default. The remaining flows are present but gated behind the
# EXPO_PUBLIC_API_URL secret. Set it to enable them.
# ---------------------------------------------------------------------------

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "packages/**"
      - ".github/workflows/e2e-mobile.yml"
  pull_request:
    paths:
      - "apps/mobile/**"
      - "packages/**"
      - ".github/workflows/e2e-mobile.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-ios:
    name: iOS E2E (Maestro)
    runs-on: macos-latest
    timeout-minutes: 60

    env:
      # Magic credentials — fall back to safe defaults when secrets are not set.
      # The API only bypasses auth when BOTH vars match what is configured
      # on the server side, so these defaults only work against a server that
      # has the same defaults configured (e.g. a local staging instance).
      APPLE_MAGIC_EMAIL: ${{ secrets.APPLE_MAGIC_EMAIL || 'test@pegada.app' }}
      APPLE_MAGIC_CODE: ${{ secrets.APPLE_MAGIC_CODE || '424242' }}
      # Stub values for non-critical EXPO_PUBLIC_ vars so the Zod schema passes.
      # Replace with real secrets for production-grade CI.
      EXPO_PUBLIC_ENV: development
      EXPO_PUBLIC_BUGSNAG_API_KEY: ci-stub
      EXPO_PUBLIC_AMPLITUDE_API_KEY: ci-stub
      EXPO_PUBLIC_REVENUE_CAT_IOS_API_KEY: ci-stub
      EXPO_PUBLIC_REVENUE_CAT_ANDROID_API_KEY: ci-stub
      EXPO_PUBLIC_IOS_GOOGLE_MAPS_API_KEY: ci-stub
      EXPO_PUBLIC_ANDROID_GOOGLE_MAPS_API_KEY: ci-stub
      # EXPO_PUBLIC_API_URL: set via secret or leave empty to skip API-dependent flows.
      EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL || 'http://localhost:3009' }}

    steps:
      # ------------------------------------------------------------------
      # 0. Select Xcode 16+ (Expo SDK 55 / expo-modules-core uses Swift 6
      #    features like MainActor isolation that need Xcode 16+).
      # ------------------------------------------------------------------
      - name: Select Xcode
        run: |
          set -euo pipefail
          # Pick the newest installed Xcode (macos-latest typically ships 15.x and 16.x).
          XCODE=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -z "$XCODE" ]; then
            XCODE=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          fi
          echo "Selecting $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v6

      # ------------------------------------------------------------------
      # 2. Node + pnpm
      # ------------------------------------------------------------------
      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20.x

      # ------------------------------------------------------------------
      # 3. Caches
      # ------------------------------------------------------------------
      - name: Get pnpm store path
        id: pnpm-store
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: apps/mobile/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('apps/mobile/ios/Podfile.lock') }}
          restore-keys: ${{ runner.os }}-pods-

      - name: Cache Maestro
        uses: actions/cache@v5
        with:
          path: ~/.maestro
          key: maestro-${{ runner.os }}-latest

      # ------------------------------------------------------------------
      # 4. Install JS dependencies
      # ------------------------------------------------------------------
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ------------------------------------------------------------------
      # 5. Setup Java 17 (for future Android support)
      # ------------------------------------------------------------------
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ------------------------------------------------------------------
      # 6. Install Maestro
      # ------------------------------------------------------------------
      - name: Install Maestro
        run: |
          if [ ! -f "$HOME/.maestro/bin/maestro" ]; then
            curl -fsSL "https://get.maestro.mobile.dev" | bash
          fi
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # ------------------------------------------------------------------
      # 7. Stub Google Services files (required by expo prebuild)
      # ------------------------------------------------------------------
      - name: Stub Google Services files
        working-directory: apps/mobile
        run: |
          # Create minimal stub files so prebuild doesn't error.
          # These are not used for the auth flow under test.
          # Use -s (non-empty) instead of -f: the apps/mobile preinstall
          # script writes a single newline when GOOGLE_SERVICES_JSON env is
          # unset, leaving a 1-byte file that passes -f but breaks parsers.
          if [ ! -s google-services.json ]; then
            echo '{"project_info":{"project_number":"000","project_id":"ci-stub","storage_bucket":""},"client":[]}' \
              > google-services.json
          fi
          if [ ! -s GoogleService-Info.plist ] || ! head -1 GoogleService-Info.plist | grep -q '<?xml'; then
            # Use printf to avoid heredoc/YAML indentation interactions.
            printf '%s\n' \
              '<?xml version="1.0" encoding="UTF-8"?>' \
              '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
              '<plist version="1.0">' \
              '<dict>' \
              '  <key>API_KEY</key><string>ci-stub</string>' \
              '  <key>BUNDLE_ID</key><string>app.pegada</string>' \
              '  <key>CLIENT_ID</key><string>ci-stub.apps.googleusercontent.com</string>' \
              '  <key>REVERSED_CLIENT_ID</key><string>com.googleusercontent.apps.ci-stub</string>' \
              '  <key>GOOGLE_APP_ID</key><string>1:000:ios:000</string>' \
              '  <key>GCM_SENDER_ID</key><string>000</string>' \
              '  <key>PROJECT_ID</key><string>ci-stub</string>' \
              '  <key>STORAGE_BUCKET</key><string></string>' \
              '  <key>IS_ADS_ENABLED</key><false/>' \
              '  <key>IS_ANALYTICS_ENABLED</key><false/>' \
              '  <key>IS_APPINVITE_ENABLED</key><true/>' \
              '  <key>IS_GCM_ENABLED</key><true/>' \
              '  <key>IS_SIGNIN_ENABLED</key><true/>' \
              '</dict>' \
              '</plist>' \
              > GoogleService-Info.plist
            echo "::group::Stub plist contents"
            cat GoogleService-Info.plist
            echo "::endgroup::"
          fi

      # ------------------------------------------------------------------
      # 8. Expo prebuild (generates ios/ directory, does not commit it)
      # ------------------------------------------------------------------
      - name: Expo prebuild (iOS)
        working-directory: apps/mobile
        run: npx expo prebuild --platform ios --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      # ------------------------------------------------------------------
      # 8b. Patch Podfile: @expo/config-plugins emits `react-native-google-maps`
      # but react-native-maps@1.27.2 ships as `react-native-maps`. Rewrite
      # the pod name in the generated Podfile so CocoaPods can resolve it.
      # ------------------------------------------------------------------
      - name: Patch Podfile (react-native-maps pod name)
        working-directory: apps/mobile/ios
        run: |
          if grep -q "react-native-google-maps" Podfile; then
            sed -i.bak "s|pod 'react-native-google-maps'|pod 'react-native-maps'|g" Podfile
            sed -i.bak "s|:path => '../../../node_modules/react-native-maps/google'|:path => '../../../node_modules/react-native-maps'|g" Podfile
            rm -f Podfile.bak
            echo "::group::Patched Podfile"
            grep -n "react-native-maps" Podfile || true
            echo "::endgroup::"
          fi

      # ------------------------------------------------------------------
      # 9. CocoaPods install
      # ------------------------------------------------------------------
      - name: CocoaPods install
        working-directory: apps/mobile/ios
        run: pod install

      # ------------------------------------------------------------------
      # 10. Build for iOS simulator
      # ------------------------------------------------------------------
      - name: Build iOS (Debug simulator)
        working-directory: apps/mobile/ios
        run: |
          set -euo pipefail
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          # The app scheme matches the .xcodeproj name (Pegada). Workspace
          # also lists every Pod scheme — pick the one tied to the .xcodeproj.
          export APP_NAME=$(ls -d *.xcodeproj | head -1 | sed 's/.xcodeproj$//')
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list -json \
            | python3 -c "
          import json,sys,os
          app=os.environ['APP_NAME']
          schemes=json.load(sys.stdin)['workspace']['schemes']
          if app in schemes: print(app)
          else:
              hit=[s for s in schemes if s.lower()==app.lower()]
              print(hit[0] if hit else app)
          ")
          echo "Building workspace=$WORKSPACE scheme=$SCHEME"
          set -o pipefail
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build \
            | xcpretty
          # Verify the .app actually exists before moving on.
          PROD_DIR=build/Build/Products/Debug-iphonesimulator
          if ! ls "$PROD_DIR"/*.app >/dev/null 2>&1; then
            echo "::error::xcodebuild reported success but produced no .app in $PROD_DIR"
            ls -la "$PROD_DIR" || true
            exit 1
          fi
          echo "Produced: $(ls -d $PROD_DIR/*.app)"

      # ------------------------------------------------------------------
      # 11. Boot simulator and install app
      # ------------------------------------------------------------------
      - name: Boot iOS simulator
        run: |
          set -euo pipefail
          # Parse the JSON device list so we never grab a section header
          # like "-- iOS 18.0 --" or the word "Shutdown" by accident.
          DEVICE_ID=$(xcrun simctl list devices available --json \
            | python3 -c "
          import json,sys
          d=json.load(sys.stdin)['devices']
          # Prefer iPhone 17/16/15 Pro then any iPhone in the newest iOS runtime
          best=None
          for runtime in sorted(d.keys(), reverse=True):
              for dev in d[runtime]:
                  name=dev.get('name','')
                  if not name.startswith('iPhone'): continue
                  if best is None: best=dev['udid']
                  if 'Pro' in name: best=dev['udid']; break
              if best and any('Pro' in x.get('name','') for x in d[runtime]): break
          print(best or '')")
          if [ -z "$DEVICE_ID" ]; then
            echo "::error::No iPhone simulator available"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Booting simulator: $DEVICE_ID"
          xcrun simctl boot "$DEVICE_ID" || true
          xcrun simctl bootstatus "$DEVICE_ID" -b
          echo "SIMULATOR_UDID=$DEVICE_ID" >> $GITHUB_ENV

      - name: Install app on simulator
        run: |
          set -euo pipefail
          echo "::group::derivedData tree"
          find apps/mobile/ios/build -name "*.app" -type d 2>/dev/null || true
          ls apps/mobile/ios/build/Build/Products/ 2>/dev/null || true
          echo "::endgroup::"
          APP_PATH=$(find apps/mobile/ios/build -name "*.app" -type d -path "*Debug-iphonesimulator*" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app produced under apps/mobile/ios/build — xcodebuild likely failed silently. Check the build step log."
            exit 1
          fi
          echo "Installing: $APP_PATH"
          xcrun simctl install "$SIMULATOR_UDID" "$APP_PATH"

      - name: Launch app (warm up)
        run: |
          xcrun simctl launch "$SIMULATOR_UDID" app.pegada || true
          sleep 3

      # ------------------------------------------------------------------
      # 12. Run Maestro flows
      # ------------------------------------------------------------------
      - name: Run Maestro launch flow (no API required)
        run: |
          maestro test apps/mobile/.maestro/launch.yaml \
            --format junit \
            --output maestro-results-launch.xml
        env:
          APPLE_MAGIC_EMAIL: ${{ env.APPLE_MAGIC_EMAIL }}
          APPLE_MAGIC_CODE: ${{ env.APPLE_MAGIC_CODE }}

      - name: Run Maestro full flows (requires EXPO_PUBLIC_API_URL secret)
        if: env.EXPO_PUBLIC_API_URL != ''
        run: |
          maestro test apps/mobile/.maestro/ \
            --format junit \
            --output maestro-results-full.xml \
            --exclude-tags no-api
        env:
          APPLE_MAGIC_EMAIL: ${{ env.APPLE_MAGIC_EMAIL }}
          APPLE_MAGIC_CODE: ${{ env.APPLE_MAGIC_CODE }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        continue-on-error: true

      # ------------------------------------------------------------------
      # 13. Upload artifacts on failure
      # ------------------------------------------------------------------
      - name: Upload Maestro results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-results
          path: |
            maestro-results-*.xml
            ~/.maestro/tests/**/*.png
          if-no-files-found: ignore

      - name: Capture simulator log on failure
        if: failure()
        run: |
          xcrun simctl spawn "$SIMULATOR_UDID" log collect \
            --output simulator.logarchive || true
        continue-on-error: true

      - name: Upload simulator log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: simulator-log
          path: simulator.logarchive
          if-no-files-found: ignore

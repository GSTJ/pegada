name: EAS Publish
on:
  push:
    branches:
      - main
    paths:
      - "apps/mobile/**"
      - "apps/shared/**"
      - ".github/workflows/deploy-mobile.yml"
      - ".github/scripts/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    name: Create Update
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: 🏗 Setup Repo
        uses: actions/checkout@v7

      - name: 🏗 Setup PNPM
        uses: pnpm/action-setup@v6.0.9

      - name: 🏗 Get PNPM store directory
        id: pnpm-cache
        run: |
          echo "pnpm_cache_dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: 🏗 Setup PNPM cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.pnpm_cache_dir }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 🏗 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: "📦 Cache Node Modules"
        uses: actions/cache@v5
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: 📦 Install Dependencies
        run: pnpm install

      # Only done as we are running Typecheck before publishing
      - name: 🏗 Setup Turborepo Cache
        uses: rharkor/caching-for-turbo@v2.5.0

      # That shouldn't be necessary if we are running before merging PR's,
      # but as commits to main are not protected yet and sometimes happen,
      # we need to make sure that the code is typechecked before publishing
      - name: 🧪 Typecheck
        run: pnpm run typecheck

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # `--environment production` pulls EXPO_PUBLIC_* from the EAS env store
      # (the same source `eas build` uses), so OTA updates and binaries stay in
      # lockstep. The old approach fed these from GitHub Actions secrets that
      # don't exist (only EXPO_TOKEN is set), so every OTA baked empty values —
      # empty EXPO_PUBLIC_API_URL is what broke the first request on 1.4.0.
      - name: 🚀 Create Update
        run: eas update --auto --non-interactive --environment production
        working-directory: apps/mobile

      # `eas update` publishes the OTA bundle but never uploads sourcemaps
      # anywhere (that's a separate step per PostHog's docs). `eas env:exec`
      # pulls POSTHOG_CLI_API_KEY/HOST/PROJECT_ID from the EAS "production"
      # environment (POSTHOG_CLI_API_KEY is stored there as "sensitive", not
      # "secret", so it IS readable by the CLI here) and injects them into
      # the script's shell env; the script itself no-ops if the key is
      # somehow still missing.
      - name: 🗺️ Upload PostHog sourcemaps (OTA)
        run: eas env:exec production 'pnpm run sourcemaps:upload:ota' --non-interactive
        working-directory: apps/mobile

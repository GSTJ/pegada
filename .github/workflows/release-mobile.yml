name: Release Mobile (build + submit)

# ---------------------------------------------------------------------------
# WHY GITHUB ACTIONS INSTEAD OF EAS CLOUD BUILDS
# ---------------------------------------------------------------------------
# EAS's free-tier build queue got too slow to be usable for release builds
# (an overnight Android production build sat in RUN_GRADLEW for ~4.5h before
# erroring out). GitHub Actions runners (macOS + Ubuntu) are free for this
# repo, so native binaries are built here with `eas build --local`, which
# runs the exact same build pipeline EAS's own workers run, just on our
# runner instead of theirs. EAS is now used ONLY for:
#   - fetching the project's remote credentials (signing identity,
#     provisioning profile, keystore) and EAS-server env vars/secrets
#     (GOOGLE_SERVICES_JSON, RevenueCat/PostHog keys, etc.) via EXPO_TOKEN
#   - store submission (`eas submit`), as a separate, manual-gated job
#
# `eas build --local` requires authentication (EXPO_TOKEN) to fetch both of
# those from EAS's servers, same as a cloud build would; the difference is
# only WHERE the compile/link/archive steps run.
# ---------------------------------------------------------------------------
# CREDENTIALS
# ---------------------------------------------------------------------------
# iOS signing uses EAS's remote credentials (managed via `eas credentials`),
# fetched non-interactively over the same EXPO_TOKEN auth. In non-interactive
# mode, EAS CLI only allows REUSING an existing valid provisioning
# profile/certificate; it refuses to GENERATE a new one without an App Store
# Connect API key (EXPO_ASC_API_KEY_PATH / EXPO_ASC_KEY_ID /
# EXPO_ASC_ISSUER_ID), see:
# https://docs.expo.dev/build/building-on-ci/#optional-provide-an-asc-api-token-for-your-apple-team
# If the stored credentials are valid this is a non-issue. If EAS decides it
# needs to mint a new profile mid-build, the iOS job will fail with an
# InsufficientAuthenticationNonInteractiveError, which needs an ASC API key
# from Gabriel to fix (only he can create one in App Store Connect).
# ---------------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        type: choice
        options:
          - all
          - ios
          - android
        default: all
      submit:
        description: "Submit the built artifact(s) to the store after a successful build"
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  EXPO_NO_TELEMETRY: 1

jobs:
  # -------------------------------------------------------------------------
  # iOS: local EAS build on a macOS runner, production profile.
  # -------------------------------------------------------------------------
  build-ios:
    name: Build iOS (production, local)
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'ios' }}
    runs-on: macos-latest
    timeout-minutes: 60
    outputs:
      ipa-artifact: ${{ steps.vars.outputs.ipa-artifact }}
    steps:
      - name: Set vars
        id: vars
        run: echo "ipa-artifact=ios-production-ipa" >> "$GITHUB_OUTPUT"

      - name: Select Xcode
        run: |
          set -euo pipefail
          XCODE=$(ls -d /Applications/Xcode_*.app 2>/dev/null \
            | sed 's|.*/Xcode_||;s|\.app$||' \
            | sort -V \
            | tail -1)
          if [ -z "$XCODE" ]; then
            echo "::error::No Xcode_*.app installed on runner"
            ls /Applications/ | grep -i xcode || true
            exit 1
          fi
          echo "Selecting Xcode $XCODE"
          sudo xcode-select -s "/Applications/Xcode_${XCODE}.app/Contents/Developer"
          xcodebuild -version

      - name: Checkout
        uses: actions/checkout@v7

      # `eas build --local` stages the project into an isolated working
      # copy (packages/eas-cli/src/vcs/local.ts's makeShallowCopyAsync)
      # that explicitly EXCLUDES anything matching .gitignore, which is
      # where GoogleService-Info.plist/google-services.json live. Writing
      # the real file into the GHA checkout before calling `eas build` is
      # a no-op: it never survives into that copy (confirmed in CI: Gradle
      # read a malformed/empty file from the copy's path even though our
      # written file validated fine in the checkout).
      #
      # apps/mobile's own `preinstall` script (setup:secret:files) already
      # exists to solve exactly this: it materializes these two files from
      # the GOOGLE_SERVICES_JSON / GOOGLE_SERVICE_INFO_PLIST env vars on
      # every `pnpm install`. So instead of writing files ourselves, we
      # decode our base64 GHA secrets into real env vars and let that
      # existing script do the writing.
      #
      # MUST run before the "Install dependencies" step below: confirmed
      # in CI that `eas build --local` does NOT reliably re-run `pnpm
      # install`/`preinstall` inside its own isolated copy (a prior run's
      # logs showed it doing so via INSTALL_DEPENDENCIES/PREBUILD phase
      # markers; this run didn't), so the only guaranteed opportunity for
      # `preinstall` to see the real value is the top-level install here.
      # If it also reruns internally, the hook's `[ ! -s file ]` guard
      # just no-ops on an already-populated file, which is harmless.
      #
      # Also fixed a latent bug in that script in the same PR: it used
      # unquoted `echo $VAR`, which word-splits on whitespace/newlines via
      # $IFS and mangles multi-line content like this plist/JSON; now
      # `printf '%s' "$VAR"` with proper quoting.
      #
      # Never echo the decoded contents anywhere (contains API keys).
      - name: Decode GoogleService secrets to env
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_SERVICE_INFO_PLIST_B64:-}" ]; then
            echo "::error::GOOGLE_SERVICE_INFO_PLIST secret is not set"
            exit 1
          fi
          DECODED=$(printf '%s' "$GOOGLE_SERVICE_INFO_PLIST_B64" | base64 --decode)
          # Sanity check without printing contents: must be well-formed XML plist.
          printf '%s' "$DECODED" | plutil -lint -
          DELIM="EOF_${GITHUB_RUN_ID}_${RANDOM}${RANDOM}"
          {
            echo "GOOGLE_SERVICE_INFO_PLIST<<$DELIM"
            printf '%s' "$DECODED"
            echo ""
            echo "$DELIM"
          } >> "$GITHUB_ENV"
        env:
          GOOGLE_SERVICE_INFO_PLIST_B64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      # Keyed on Podfile.lock like e2e-mobile.yml. `eas build --local` runs
      # its own `pod install` internally during prebuild, this cache just
      # gives that step a warm CocoaPods cache to pull from.
      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: apps/mobile/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('apps/mobile/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pods-

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS build (iOS, production, local)
        working-directory: apps/mobile
        run: |
          eas build \
            --platform ios \
            --profile production \
            --local \
            --non-interactive \
            --output "$RUNNER_TEMP/Pegada.ipa"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.vars.outputs.ipa-artifact }}
          path: ${{ runner.temp }}/Pegada.ipa
          retention-days: 14

  # -------------------------------------------------------------------------
  # Android: local EAS build on an Ubuntu runner, production profile.
  # -------------------------------------------------------------------------
  build-android:
    name: Build Android (production, local)
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'android' }}
    runs-on: ubuntu-latest
    # A cold-cache first run on a 4-core hosted runner (no ~/.gradle to
    # restore, eas build --local doing its own prebuild on top of
    # gradlew bundleRelease) plausibly exceeds 60 minutes; this isn't
    # pathological; 90 gives headroom without masking a real hang.
    timeout-minutes: 90
    outputs:
      aab-artifact: ${{ steps.vars.outputs.aab-artifact }}
    steps:
      - name: Set vars
        id: vars
        run: echo "aab-artifact=android-production-aab" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v7

      # See the long comment on the matching iOS step: `eas build --local`
      # stages an isolated copy of the project that excludes anything
      # .gitignore'd (which includes google-services.json), so a file we
      # write into the GHA checkout never survives into that copy.
      # Decode into an env var instead and let apps/mobile's own
      # `preinstall` script (setup:secret:files) write the file.
      #
      # MUST run before "Install dependencies" below: confirmed in CI that
      # `eas build --local` does not reliably re-run `pnpm
      # install`/`preinstall` inside its own isolated copy, so the
      # top-level install here is the only guaranteed opportunity for the
      # hook to see the real value. A run where this step came AFTER
      # install produced an empty google-services.json (the hook's `[ !
      # -s file ]` guard saw the env var as unset and wrote nothing).
      - name: Decode GoogleService secrets to env
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_SERVICES_JSON_B64:-}" ]; then
            echo "::error::GOOGLE_SERVICES_JSON secret is not set"
            exit 1
          fi
          DECODED=$(printf '%s' "$GOOGLE_SERVICES_JSON_B64" | base64 --decode)
          # Sanity check without printing contents: must be well-formed JSON.
          printf '%s' "$DECODED" | python3 -m json.tool > /dev/null
          DELIM="EOF_${GITHUB_RUN_ID}_${RANDOM}${RANDOM}"
          {
            echo "GOOGLE_SERVICES_JSON<<$DELIM"
            printf '%s' "$DECODED"
            echo ""
            echo "$DELIM"
          } >> "$GITHUB_ENV"
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      # Gradle's own dependency/build cache. `eas build --local` runs
      # prebuild + `gradlew bundleRelease` internally; this just warms
      # ~/.gradle so that invocation doesn't start stone cold.
      #
      # Split into restore/save (rather than the combined actions/cache
      # action) so the save step can run with `if: always()`. The
      # combined action's save only fires from its own post-job hook,
      # which is NOT guaranteed to run if the job is killed by
      # timeout-minutes -- we want a slow/cold first run to still leave a
      # warm cache behind for the next attempt, timeout or not.
      - name: Restore Gradle cache
        id: gradle-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/mobile/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Root cause of the rc6 hang: the Gradle DAEMON hit its default
      # metaspace ceiling (~512 MiB, per Gradle's own
      # org.gradle.jvmargs default of -Xmx512m -XX:MaxMetaspaceSize=384m)
      # about 12 minutes into `gradlew :app:bundleRelease`, threw repeated
      # `OutOfMemoryError: Metaspace` from its idle RMI thread, and then
      # wedged (not crashed) rather than dying cleanly, leaving the whole
      # process tree alive but stuck for the remaining ~64 minutes with
      # zero log output until our step timeout finally killed it.
      #
      # EAS's own cloud build workers never hit this: their job config
      # explicitly sets GRADLE_OPTS="-Dorg.gradle.jvmargs=\"-XX:MaxMetaspaceSize=1g
      # -Xmx4g ...\" -Dorg.gradle.daemon=false" (confirmed against the
      # overnight cloud build's own logs). We match that here.
      #
      # Per Gradle's docs (config_gradle.html / build_environment.html):
      # GRADLE_OPTS configures the CLIENT jvm and "typically doesn't
      # affect the daemon" on its own; org.gradle.jvmargs is what actually
      # controls the JVM that runs the build (daemon or not). We set both:
      #   - org.gradle.jvmargs via ~/.gradle/gradle.properties: this path
      #     is the user's global Gradle config, it lives OUTSIDE
      #     apps/mobile entirely so `eas build --local`'s gitignore-
      #     filtered shallow copy (see the GoogleService comments above)
      #     can't drop it, and Gradle reads it regardless of which
      #     directory invokes gradlew.
      #   - GRADLE_OPTS with -Dorg.gradle.daemon=false on the build step's
      #     own env, since this IS explicitly forwarded via GRADLE_OPTS
      #     per Gradle's docs. A persistent daemon buys nothing on an
      #     ephemeral single-build CI runner anyway, and removes an entire
      #     class of "wedged background process" failure like this one.
      - name: Configure Gradle JVM memory (avoid daemon Metaspace OOM)
        run: |
          set -euo pipefail
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
          EOF
          cat ~/.gradle/gradle.properties

      # Step-level timeout shorter than the job's, on purpose: a job-level
      # timeout-minutes kill terminates the whole runner process tree
      # immediately, it does NOT let subsequent if: always() steps run
      # (that's different from a step merely failing, which DOES leave
      # the rest of the job to execute). To guarantee the Gradle cache
      # save below actually runs on a slow/hung build, this step must
      # fail on its own before the job-level ceiling hits, leaving
      # headroom in the job for the always() save step afterward.
      - name: EAS build (Android, production, local)
        working-directory: apps/mobile
        timeout-minutes: 80
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
        run: |
          eas build \
            --platform android \
            --profile production \
            --local \
            --non-interactive \
            --output "$RUNNER_TEMP/pegada.aab"

      # Runs even if the build step above failed (including its own
      # step-level timeout above), so a slow cold run still leaves a warm
      # cache for the next attempt. Skips saving if we got an exact-key
      # cache hit (nothing changed, re-saving would be wasted work).
      - name: Save Gradle cache
        if: always() && steps.gradle-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ steps.gradle-cache-restore.outputs.cache-primary-key }}

      - name: Upload .aab artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.vars.outputs.aab-artifact }}
          path: ${{ runner.temp }}/pegada.aab
          retention-days: 14

  # -------------------------------------------------------------------------
  # Submission: manual-gated. Only runs when `submit` input is explicitly
  # true (workflow_dispatch only; tag pushes never auto-submit). Downloads
  # whichever artifact(s) the build jobs produced and calls `eas submit`,
  # which pushes straight to app review, so this must stay opt-in.
  # -------------------------------------------------------------------------
  submit-ios:
    name: Submit iOS to App Store
    needs: build-ios
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.submit == true && (inputs.platform == 'all' || inputs.platform == 'ios') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download .ipa artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ needs.build-ios.outputs.ipa-artifact }}
          path: artifact

      # `eas submit` evaluates apps/mobile/app.config.ts, which imports the
      # `expo` package -- without an install it dies with "Cannot find
      # package 'expo'" before ever talking to the store.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS submit (iOS)
        working-directory: apps/mobile
        run: |
          eas submit \
            --platform ios \
            --path "$GITHUB_WORKSPACE/artifact/Pegada.ipa" \
            --non-interactive

  submit-android:
    name: Submit Android to Play Store
    needs: build-android
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.submit == true && (inputs.platform == 'all' || inputs.platform == 'android') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download .aab artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ needs.build-android.outputs.aab-artifact }}
          path: artifact

      # Same as submit-ios: `eas submit` needs node_modules to evaluate the
      # Expo config before it can talk to the store.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS submit (Android)
        working-directory: apps/mobile
        run: |
          eas submit \
            --platform android \
            --path "$GITHUB_WORKSPACE/artifact/pegada.aab" \
            --non-interactive

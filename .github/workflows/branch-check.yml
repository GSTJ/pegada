name: Branch Checkup
# NOTE: this workflow is push-triggered (branches-ignore: main), not
# pull_request-triggered, so there's no github.event.pull_request.draft
# to gate on here — GitHub still surfaces these runs on the PR because
# it associates push-to-branch runs with any open PR for that branch.
# Draft-gating (see e2e-mobile.yml) only applies to pull_request-triggered
# workflows; converting this trigger to pull_request would change the
# checkout ref (merge commit vs branch head) for no real benefit, since
# this job is cheap relative to e2e.
on:
  push:
    branches-ignore:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Dedupe runs alone first: it's a lockfile sanity check, not a per-task
  # matrix concern, and gating the matrix on it avoids paying for 3 parallel
  # setups when the lockfile itself is broken.
  dedupe:
    name: 🧹 Dedupe
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup Repo
        uses: actions/checkout@v7

      - name: 🏗 Setup PNPM
        uses: pnpm/action-setup@v6.0.9

      - name: 🏗 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: pnpm

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧹 Dedupe
        run: pnpm dedupe --check

  # Typecheck/lint/format used to run serially in one job (~sum of all
  # three). Splitting into a matrix trades that for parallel wall-clock =
  # setup + slowest task: each job pays its own ~40s setup (checkout, pnpm,
  # node, turbo cache restore), but with turbo cache hits the tasks
  # themselves are fast, so 3 parallel setups + max(task) beats 1 setup +
  # sum(tasks) once the tasks aren't trivially fast.
  checkup:
    name: ${{ matrix.emoji }} ${{ matrix.label }}
    needs: dedupe
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - task: typecheck
            label: Typecheck
            emoji: 🧪
          - task: lint
            label: Lint
            emoji: 🧹
          - task: format
            label: Format
            emoji: 💅
    steps:
      - name: 🏗 Setup Repo
        uses: actions/checkout@v7

      - name: 🏗 Setup PNPM
        uses: pnpm/action-setup@v6.0.9

      - name: 🏗 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: pnpm

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗 Setup Turborepo Cache
        uses: rharkor/caching-for-turbo@v2.5.0

      - name: ${{ matrix.emoji }} ${{ matrix.label }}
        run: pnpm run ${{ matrix.task }}
